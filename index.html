<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#F5F5F7;--surface:#FFFFFF;--surface2:#F0F0F5;--border:#E2E2EC;--border2:#CACAD8;--text:#1A1A2E;--muted:#8888A8;--subtle:#AAA;--doac:#E84E14;--ba:#00A88A;--wnt:#8B35D6;--tl:#0284C7;--hsr:#D4005A;--cat-theme:#B07500;--cat-awareness:#C4336A;--cat-sports:#0F7A52;--cat-music:#0369A1;--cat-industry:#9A5C00;--cat-film:#B91C1C;--cat-retail:#5B21B6;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.mobile-header{display:none;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;}
.sidebar-overlay.active{display:block;}
.app{display:flex;height:100vh;}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.brand{padding:22px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;letter-spacing:.04em;color:var(--text);}
.brand-sub{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.months-section{flex:1;overflow-y:auto;padding:12px 10px;}
.section-lbl{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:0 6px;margin-bottom:7px;}
.month-btn{width:100%;background:none;border:none;color:var(--muted);cursor:pointer;text-align:left;padding:7px 10px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:400;transition:all .18s;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.month-btn:hover{background:var(--surface2);color:var(--text);}
.month-btn.active{background:linear-gradient(90deg,rgba(0,0,0,.05),rgba(0,0,0,.03));color:var(--text);font-weight:600;border:1px solid var(--border2);}
.month-btn .evt-count{font-size:10px;background:var(--surface2);color:var(--muted);padding:2px 7px;border-radius:10px;}
.month-btn.active .evt-count{background:rgba(0,0,0,.08);color:var(--text);}
.legend{padding:12px 14px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.legend-title{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.show-legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;padding:3px 4px;border-radius:5px;transition:background .15s;}
.show-legend-item:hover{background:var(--surface2);}
.show-legend-item.dimmed{opacity:.28;}
.show-pip{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.show-legend-name{font-size:11px;color:var(--text);line-height:1.3;}
.show-legend-host{font-size:10px;color:var(--muted);}
.show-legend-topics{font-size:9px;color:var(--subtle);display:none;margin-top:1px;line-height:1.4;}
.show-legend-item:hover .show-legend-topics{display:block;}
.top-bar{padding:20px 32px 0;flex-shrink:0;border-bottom:1px solid var(--border);}
.month-hero{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.month-display{font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:700;line-height:1;letter-spacing:-.02em;color:var(--text);}
.month-display em{font-style:normal;opacity:.3;font-size:34px;margin-left:8px;}
.event-total{text-align:right;color:var(--muted);font-size:12px;padding-bottom:4px;}
.event-total strong{color:var(--text);font-size:20px;font-weight:500;display:block;}
.themes-row{display:flex;flex-wrap:wrap;gap:5px;padding-bottom:12px;}
.theme-pill{background:rgba(176,117,0,.08);border:1px solid rgba(176,117,0,.2);color:var(--cat-theme);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;padding:9px 32px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;}
.filter-lbl{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-right:4px;}
.cat-btn{background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;padding:4px 11px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .18s;display:flex;align-items:center;gap:5px;}
.cat-btn:hover{border-color:var(--text);color:var(--text);}
.cat-btn.active{border-color:var(--text);color:var(--text);background:rgba(0,0,0,.07);font-weight:600;}
.cat-dot{width:6px;height:6px;border-radius:50%;}
.events-wrapper{flex:1;overflow-y:auto;padding:14px 32px 32px;}
.events-list{display:flex;flex-direction:column;gap:5px;}
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;transition:all .18s;animation:slideIn .22s ease both;cursor:default;}
.event-card:hover{background:var(--surface2);border-color:var(--border2);}
@keyframes slideIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.evt-date{min-width:40px;text-align:center;flex-shrink:0;}
.evt-date .d{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:var(--text);line-height:1;}
.evt-date .m{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.evt-sep{width:1px;height:30px;background:var(--border);flex-shrink:0;}
.evt-content{flex:1;min-width:0;}
.evt-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:3px;}
.evt-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cat-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:2px 7px;border-radius:10px;}
.cat-tag.theme{background:rgba(176,117,0,.1);color:var(--cat-theme);border:1px solid rgba(176,117,0,.22);}
.cat-tag.awareness{background:rgba(196,51,106,.1);color:var(--cat-awareness);border:1px solid rgba(196,51,106,.22);}
.cat-tag.sports{background:rgba(15,122,82,.1);color:var(--cat-sports);border:1px solid rgba(15,122,82,.22);}
.cat-tag.music{background:rgba(3,105,161,.1);color:var(--cat-music);border:1px solid rgba(3,105,161,.22);}
.cat-tag.industry{background:rgba(154,92,0,.1);color:var(--cat-industry);border:1px solid rgba(154,92,0,.22);}
.cat-tag.film{background:rgba(185,28,28,.1);color:var(--cat-film);border:1px solid rgba(185,28,28,.22);}
.cat-tag.retail{background:rgba(91,33,182,.1);color:var(--cat-retail);border:1px solid rgba(91,33,182,.22);}
.evt-span{font-size:10px;color:var(--muted);font-style:italic;}
.evt-why{display:none;font-size:9px;color:var(--muted);margin-top:3px;font-style:italic;}
.event-card:hover .evt-why{display:block;}
.evt-shows{display:flex;gap:4px;flex-shrink:0;margin-left:auto;}
.show-pill{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;transition:transform .15s;cursor:default;}
.show-pill:hover{transform:scale(1.15);}
.show-pill[data-show="DOAC"]{background:rgba(232,78,20,.12);color:var(--doac);border:1.5px solid rgba(232,78,20,.4);}
.show-pill[data-show="BA"]{background:rgba(0,168,138,.12);color:var(--ba);border:1.5px solid rgba(0,168,138,.4);}
.show-pill[data-show="WNT"]{background:rgba(139,53,214,.12);color:var(--wnt);border:1.5px solid rgba(139,53,214,.4);}
.show-pill[data-show="TL"]{background:rgba(2,132,199,.12);color:var(--tl);border:1.5px solid rgba(2,132,199,.4);}
.show-pill[data-show="HSR"]{background:rgba(212,0,90,.12);color:var(--hsr);border:1.5px solid rgba(212,0,90,.4);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}
.empty-text{font-size:13px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(max-width:768px){
html,body{height:auto;overflow:auto;}
.app{flex-direction:column;height:auto;min-height:100vh;}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;z-index:100;transition:left .28s ease;overflow-y:auto;}
.sidebar.open{left:0;}
.mobile-header{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;flex-shrink:0;position:sticky;top:0;z-index:50;}
.mobile-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;letter-spacing:.04em;color:var(--text);}
.mobile-nav{display:flex;align-items:center;gap:10px;}
.mobile-menu-btn{background:none;border:1px solid var(--border2);border-radius:7px;padding:6px 12px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text);cursor:pointer;}
.mobile-month-display{font-size:13px;font-weight:600;color:var(--muted);}
.main{flex:1;overflow:visible;}
.top-bar{padding:16px 18px 0;}
.month-display{font-size:36px;}
.month-display em{font-size:24px;}
.filter-bar{padding:8px 18px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.cat-btn,.filter-lbl{flex-shrink:0;white-space:nowrap;}
.events-wrapper{padding:12px 18px 40px;overflow:visible;}
.show-pill{width:22px;height:22px;font-size:7px;}
}
</style>
</head>

<script>
const SHOWS={
  DOAC:{name:'Diary of a CEO',host:'Steven Bartlett',color:'#E84E14',abbr:'DC',audience:'The Striver (22-34) · The Builder (28-42) · The Achiever (35-50) · The Curious Pro (24-38) · The Late Adopter (45-65+)'},
  BA:{name:'Begin Again',host:'Davina McCall',color:'#00A88A',abbr:'BA',audience:'The Intentional Resetter · The Midlife Truth-Seeker · The Quiet Reinventor · UK growth priority · Themes: Love, Sex, Grief'},
  WNT:{name:'We Need to Talk',host:'Paul C. Brunson',color:'#8B35D6',abbr:'WT',audience:'The Emotionally Curious (25-40) · The Cultural Processor (28-45) · The Self-Dev Adjacent (22-35) · US growth priority'},

  HSR:{name:'Hot Smart Rich',host:'Maggie Sellers Reum',color:'#D4005A',abbr:'HS',audience:'The Power-Curious Woman (18-24) · The Ambitious Operator (28-45) · The Culture-First Listener (21-32) · US growth priority'},
};
const CALENDAR={
  jan:{label:'January',themes:['New Year Reset Season','Dry January','Veganuary','Q1 Advertiser Peak'],events:[
    {e:'1 Jan',n:'New Year — The Reset Ritual',c:'awareness',s:['DOAC','HSR','TL','BA','WNT'],w:"DOAC: The Striver is compressing the distance between where he is and where he wants to be. Steven's 'why' lens on who people want to become. TL: The Optimiser builds the year's performance stack. The Believer sets the line they want to step over. HSR: She doesn't make resolutions. She makes declarations. BA: The Intentional Resetter chose this year deliberately. WNT: Paul's angle — what does a fresh start actually mean for how we connect with each other?"},
    {e:'1 Jan',n:'Dry January — Brain Chemistry, Sleep and Performance',c:'awareness',s:['DOAC','TL','BA'],w:"DOAC: Neuroscience of alcohol on cognition and recovery — The Curious Pro wants the science. TL: The Optimiser tracks sleep and recovery data during a dry month. Dr Holmes' WHOOP angle is direct. BA: The Quiet Reinventor uses January as a private reset she hasn't announced to anyone."},
    {e:'1 Jan',n:'Veganuary — Nutrition Science vs Ideology',c:'awareness',s:['DOAC','TL'],w:"DOAC: Steven's 'why' lens on what the evidence actually says. The Curious Pro wants the science stripped of ideology. TL: Nutrition as a performance input. The Optimiser wants the protocol, not the moral argument."},
    {e:'15 Jan',n:'Australian Open — Elite Tennis Performance',c:'sports',s:['TL'],sp:'15 Jan–1 Feb',w:"TL: The Fan follows every Grand Slam. The Optimiser studies mental conditioning, match-day routines, and recovery protocols. Dr Holmes' background makes this the richest January event for performance science content."},
    {e:'1 Jan',n:'Q1 Advertiser Peak — Health, Wellness and Self-Improvement',c:'retail',s:['DOAC','BA','TL','HSR','WNT'],w:'All shows: highest CPM rates of the year for health and self-improvement categories. The window to lock in annual partnerships.'},
  ]},
  feb:{label:'February',themes:['Black History Month (US/Canada)','LGBTQ+ History Month (UK)'],events:[
    {e:'1 Feb',n:'Grammy Awards — The Business of Music',c:'music',s:['DOAC','HSR'],w:"DOAC: The Builder and Achiever want to understand who controls the IP, who got their deal, what the numbers say about the industry. HSR: Maggie decodes who won commercially, not just critically. The Ambitious Operator reads the Grammys as a power map."},
    {e:'1 Feb',n:'Black History Month (US/Canada)',c:'theme',s:['HSR','WNT'],w:"HSR: Black female founders and investors through Maggie's real network. The Ambitious Operator wants receipts, not inspiration. WNT: Paul C. Brunson's identity, legacy, and love themes make this fully earned. The Emotionally Curious processes cultural identity honestly."},
    {e:'6 Feb',n:'Winter Olympics — Milan/Cortina',c:'sports',s:['TL'],sp:'6–22 Feb',w:"TL: Two weeks of elite performance science content. Every sport surfaces different marginal gains. The Optimiser studies the protocols. The Fan has a deep cultural relationship with Olympic athletes. Dr Holmes' background makes this the richest content window of Q1."},
    {e:'8 Feb',n:'Super Bowl — Sport, Business and Culture',c:'sports',s:['DOAC','HSR','TL'],w:"DOAC: The business of the Super Bowl — who made what, what the ad market reveals about the economy. The Builder and Striver follow closely. HSR: Maggie decodes the brand deals and cultural capital on display. The Culture-First Listener is watching. TL: Elite physical and mental preparation — how the best athletes peak for one day."},
    {e:'14 Feb',n:"Valentine's Day — What We Actually Want From Each Other",c:'awareness',s:['WNT','BA'],w:"WNT: Paul's angle is always honest and uncomfortable. The Emotionally Curious uses this as a processing moment. The Cultural Processor wants to understand what the day reveals about relationships culturally. BA: The Midlife Truth-Seeker is asking harder questions about love at this stage. Love, sex, and grief are the three themes that resonate most with Davina's audience."},
    {e:'22 Feb',n:'BAFTA Film Awards — Storytelling and British Cultural Power',c:'industry',s:['DOAC','BA'],w:"DOAC: The business of storytelling — IP deals, distribution power, studio economics. BA: The ceremony gathers many of Britain's most compelling begin-again stories. British Icons and Stiff-Upper-Lip Challengers are BA's best performing guest archetypes."},
    {e:'28 Feb',n:'Brit Awards — UK Music Industry',c:'music',s:['DOAC'],w:'DOAC: Business of the UK music industry — who controls the masters, who is building versus riding a moment. The Builder wants the commercial lens.'},
    {e:'Feb',n:'LGBTQ+ History Month (UK)',c:'theme',s:['WNT','BA'],w:"WNT: Paul's platform was built on inclusive conversation about love and identity. BA: Davina's audience is predominantly female and the show explicitly celebrates lives lived differently."},
    {e:'7 Feb',n:"Valentine's Week — Relationship and Wellness Gifting Peak",c:'retail',s:['WNT','BA'],w:'WNT: Relationship and intimacy brand partnerships peak — highest demand of the year. BA: Wellness gifting for women in midlife transition.'},
  ]},
  mar:{label:'March',themes:["Women's History Month",'Endometriosis Awareness Month','Spring Performance Season'],events:[
    {e:'8 Mar',n:"International Women's Day",c:'awareness',s:['HSR','BA','WNT','DOAC','TL'],w:"HSR: This is not a content obligation — it is the founding belief. The Ambitious Operator wants specifics: funding data, board representation numbers, Maggie's investor network. BA: The Intentional Resetter chose this year for herself. WNT: Paul amplifies women's voices credibly — The Cultural Processor expects a non-generic take. DOAC: The Achiever (54% female in that cohort) wants the power and authority conversation. TL: Dr Holmes is the only female host in the sports performance podcast category."},
    {e:'15 Mar',n:'F1 Season Opener — Australian Grand Prix',c:'sports',s:['TL','DOAC'],w:"TL: The Fan and Optimiser follow F1 obsessively — the marginal gains culture is directly applicable. DOAC: The business of F1, the psychology of team dynamics, and what wins championships beyond the car."},
    {e:'15 Mar',n:'Oscars — The Business of Hollywood',c:'industry',s:['DOAC'],w:"DOAC: Not the dresses. The IP deals, studio economics, and power structures. The Builder and Achiever want to understand how the industry actually works."},
    {e:'26 Mar',n:'Equal Pay Day (US)',c:'awareness',s:['HSR'],w:"HSR: Maggie's angle is never protest — it is strategy. The gap closes when women build their own tables. The Ambitious Operator wants the VC funding data decoded as gossip."},
    {e:'20 Mar',n:'Project Hail Mary — Ryan Gosling',c:'film',s:['TL','DOAC'],w:"TL: Science and problem-solving under extreme pressure. The Optimiser and Believer connect to the human performance story. DOAC: The Curious Pro follows science and curiosity-driven storytelling."},
    {e:'Mar',n:"Women's History Month",c:'theme',s:['HSR','BA','WNT'],w:"HSR: The entire month is HSR territory. Maggie's full network, real stories, operational depth — not celebration content. BA: Women who began again are Women's History content. Davina's guests are often exactly these women. WNT: Paul surfaces the women whose stories are underrepresented — The Cultural Processor expects this."},
    {e:'Mar',n:'Endometriosis Awareness Month',c:'theme',s:['BA','DOAC'],w:"BA: The Midlife Truth-Seeker and Intentional Resetter are at the right age for this to be personal. Davina's documented openness about her own health earns this topic. DOAC: The Late Adopter (56% female) arrived via health-related content — hormones and fertility are her entry point."},
    {e:'22 Mar',n:"Mother's Day UK — Gifting Peak",c:'retail',s:['BA','WNT'],w:'BA: Wellness and midlife gifting peaks. WNT: Relationship and family experiences.'},
    {e:'8 Mar',n:"IWD — Female Brand Partnership Peak",c:'retail',s:['HSR','BA','WNT'],w:'HSR: Single highest-demand day of the year for female-founder brand deals. BA: Female wellness brand partnerships. WNT: Empowerment and identity brand moments.'},
  ]},
  apr:{label:'April',themes:['Financial Literacy Month (US)','Stress Awareness Month','Marathon Season'],events:[
    {e:'Apr',n:'Financial Literacy Month (US)',c:'theme',s:['HSR','DOAC'],w:"HSR: The Ambitious Operator wants real numbers, real portfolios, real investor talk — not financial literacy as a concept but as a practice. DOAC: The Builder and Achiever pressure-test their financial frameworks. The Curious Pro wants the mental models."},
    {e:'15 Apr',n:'She Filed — Tax Day (US)',c:'awareness',s:['HSR'],w:"HSR: A high tax bill is proof of earnings. Maggie reframes Tax Day as a flex — your receipt for building something real. The Power-Curious Woman gets her first lesson in financial identity."},
    {e:'9 Apr',n:'Masters Golf — Augusta',c:'sports',s:['TL','DOAC'],sp:'9–12 Apr',w:"TL: Mental performance under the most pressurised conditions in golf. The Fan and Optimiser follow closely. DOAC: The business and psychology of elite sport — how athletes perform when the stakes are highest."},
    {e:'20 Apr',n:'Boston Marathon',c:'sports',s:['TL'],w:"TL: The Optimiser has likely trained for or dreamed of Boston. Elite endurance science is directly applicable to The Line's audience."},
    {e:'26 Apr',n:'London Marathon',c:'sports',s:['TL','BA'],w:"TL: One of the six World Marathon Majors. Elite endurance science and training methodology. BA: The Intentional Resetter may have signed up for the marathon as her begin-again moment. Davina's own fitness story makes this personal and credible."},
    {e:'19 Apr',n:'Coachella — Culture, Commerce and Creator Economy',c:'music',s:['DOAC','HSR'],sp:'19–21 Apr',w:"DOAC: The business of Coachella — who owns what, the festival economy, how brand partnerships work at scale. HSR: Maggie decodes who is building a brand versus performing one. The Culture-First Listener is watching which women are on the bill."},

let activeMonth='jan',activeCat='all',activeShows=new Set(['DOAC','BA','WNT','TL','HSR']);
const monthKeys=Object.keys(CALENDAR);
const monthNav=document.getElementById('monthNav');
monthKeys.forEach(key=>{
  const data=CALENDAR[key];
  const btn=document.createElement('button');
  btn.className='month-btn'+(key===activeMonth?' active':'');
  btn.dataset.month=key;
  btn.innerHTML=`${data.label}<span class="evt-count">${data.events.length}</span>`;
  btn.addEventListener('click',()=>{
    activeMonth=key;activeCat='all';
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');render();
  });
  monthNav.appendChild(btn);
});
const showLegend=document.getElementById('showLegend');
Object.entries(SHOWS).forEach(([key,s])=>{
  const item=document.createElement('div');
  item.className='show-legend-item';item.dataset.show=key;
  item.innerHTML=`<div class="show-pip" style="background:${s.color}18;color:${s.color};border:1.5px solid ${s.color}55">${s.abbr}</div><div><div class="show-legend-name">${s.name}</div><div class="show-legend-host">${s.host}</div><div class="show-legend-topics">${s.audience}</div></div>`;
  item.addEventListener('click',()=>{
    if(activeShows.has(key)){if(activeShows.size>1)activeShows.delete(key);}else activeShows.add(key);
    document.querySelectorAll('.show-legend-item').forEach(el=>el.classList.toggle('dimmed',!activeShows.has(el.dataset.show)));
    render();
  });
  showLegend.appendChild(item);
});
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeCat=btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');render();
  });
});
function render(){
  const data=CALENDAR[activeMonth];
  document.getElementById('monthDisplay').innerHTML=`${data.label} <em>2026</em>`;
  document.getElementById('themesRow').innerHTML=data.themes.map(t=>`<span class="theme-pill">${t}</span>`).join('');
  const filtered=data.events.filter(ev=>(activeCat==='all'||ev.c===activeCat)&&ev.s.some(s=>activeShows.has(s)));
  document.getElementById('evtCount').textContent=filtered.length;
  const list=document.getElementById('eventsList');list.innerHTML='';
  if(!filtered.length){list.innerHTML=`<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">No events match your current filters.</div></div>`;return;}
  const catLabels={theme:'Monthly Theme',awareness:'Awareness',sports:'Sports',music:'Music',industry:'Industry / Awards',film:'Film Release',retail:'Retail / Commercial'};
  filtered.forEach((ev,i)=>{
    const card=document.createElement('div');
    card.className='event-card';card.style.animationDelay=`${i*16}ms`;
    const parts=ev.e.split(' ');
    const showPills=ev.s.filter(s=>activeShows.has(s)).map(s=>`<div class="show-pill" data-show="${s}" title="${SHOWS[s].name}">${SHOWS[s].abbr}</div>`).join('');
    card.innerHTML=`<div class="evt-date"><div class="d">${parts[0]}</div>${parts[1]?`<div class="m">${parts[1]}</div>`:''}</div><div class="evt-sep"></div><div class="evt-content"><div class="evt-name">${ev.n}</div><div class="evt-meta"><span class="cat-tag ${ev.c}">${catLabels[ev.c]||ev.c}</span>${ev.sp?`<span class="evt-span">· ${ev.sp}</span>`:''}</div>${ev.w?`<div class="evt-why">↳ ${ev.w}</div>`:''}</div><div class="evt-shows">${showPills}</div>`;
    list.appendChild(card);
  });
}
render();
const sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay'),menuBtn=document.getElementById('mobileMenuBtn'),mobileMonth=document.getElementById('mobileMonthDisplay');
function openSidebar(){sidebar.classList.add('open');overlay.classList.add('active');}
function closeSidebar(){sidebar.classList.remove('open');overlay.classList.remove('active');}
if(menuBtn)menuBtn.addEventListener('click',openSidebar);
if(overlay)overlay.addEventListener('click',closeSidebar);
document.querySelectorAll('.month-btn').forEach(btn=>{btn.addEventListener('click',()=>{closeSidebar();if(mobileMonth)mobileMonth.textContent=CALENDAR[btn.dataset.month].label;});});
if(mobileMonth)mobileMonth.textContent=CALENDAR[activeMonth].label;
</script>
