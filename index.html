<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F5F5F7;--surface:#FFFFFF;--surface2:#F0F0F5;--border:#E2E2EC;--border2:#CACAD8;
  --text:#1A1A2E;--muted:#8888A8;--subtle:#AAA;
  --doac:#E84E14;--ba:#00A88A;--wnt:#8B35D6;--tl:#0284C7;--hsr:#D4005A;
  --cat-theme:#B07500;--cat-awareness:#C4336A;--cat-sports:#0F7A52;
  --cat-music:#0369A1;--cat-industry:#9A5C00;--cat-film:#B91C1C;
  --cat-retail:#5B21B6;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.app{display:flex;height:100vh;}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}

.brand{padding:22px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;letter-spacing:.04em;color:var(--text);}
.brand-sub{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:3px;}

.source-badges{padding:8px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.source-title{font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.badges{display:flex;flex-wrap:wrap;gap:3px;}
.badge{font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}

.months-section{flex:1;overflow-y:auto;padding:12px 10px;}
.section-lbl{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:0 6px;margin-bottom:7px;}
.month-btn{width:100%;background:none;border:none;color:var(--muted);cursor:pointer;text-align:left;padding:7px 10px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:400;transition:all .18s;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.month-btn:hover{background:var(--surface2);color:var(--text);}
.month-btn.active{background:linear-gradient(90deg,rgba(0,0,0,.05),rgba(0,0,0,.03));color:var(--text);font-weight:600;border:1px solid var(--border2);}
.month-btn .evt-count{font-size:10px;background:var(--surface2);color:var(--muted);padding:2px 7px;border-radius:10px;}
.month-btn.active .evt-count{background:rgba(0,0,0,.08);color:var(--text);}

.legend{padding:12px 14px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.legend-title{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.show-legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;padding:3px 4px;border-radius:5px;transition:background .15s;}
.show-legend-item:hover{background:var(--surface2);}
.show-legend-item.dimmed{opacity:.28;}
.show-pip{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.show-legend-name{font-size:11px;color:var(--text);line-height:1.3;}
.show-legend-host{font-size:10px;color:var(--muted);}

/* Topic tooltip on hover */
.show-legend-topics{font-size:9px;color:var(--subtle);display:none;margin-top:1px;line-height:1.4;}
.show-legend-item:hover .show-legend-topics{display:block;}

.top-bar{padding:20px 32px 0;flex-shrink:0;border-bottom:1px solid var(--border);}
.month-hero{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.month-display{font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:700;line-height:1;letter-spacing:-.02em;color:var(--text);}
.month-display em{font-style:normal;opacity:.3;font-size:34px;margin-left:8px;}
.event-total{text-align:right;color:var(--muted);font-size:12px;padding-bottom:4px;}
.event-total strong{color:var(--text);font-size:20px;font-weight:500;display:block;}

.themes-row{display:flex;flex-wrap:wrap;gap:5px;padding-bottom:12px;}
.theme-pill{background:rgba(176,117,0,.08);border:1px solid rgba(176,117,0,.2);color:var(--cat-theme);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}

.filter-bar{display:flex;gap:5px;flex-wrap:wrap;padding:9px 32px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;}
.filter-lbl{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-right:4px;}
.cat-btn{background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;padding:4px 11px;border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .18s;display:flex;align-items:center;gap:5px;}
.cat-btn:hover{border-color:var(--text);color:var(--text);}
.cat-btn.active{border-color:var(--text);color:var(--text);background:rgba(0,0,0,.07);font-weight:600;}
.cat-dot{width:6px;height:6px;border-radius:50%;}

.events-wrapper{flex:1;overflow-y:auto;padding:14px 32px 32px;}
.events-list{display:flex;flex-direction:column;gap:5px;}

.event-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;transition:all .18s;animation:slideIn .22s ease both;cursor:default;}
.event-card:hover{background:var(--surface2);border-color:var(--border2);}
@keyframes slideIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.evt-date{min-width:40px;text-align:center;flex-shrink:0;}
.evt-date .d{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:var(--text);line-height:1;}
.evt-date .m{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.evt-sep{width:1px;height:30px;background:var(--border);flex-shrink:0;}

.evt-content{flex:1;min-width:0;}
.evt-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:3px;}
.evt-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cat-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:2px 7px;border-radius:10px;}
.cat-tag.theme{background:rgba(176,117,0,.1);color:var(--cat-theme);border:1px solid rgba(176,117,0,.22);}
.cat-tag.awareness{background:rgba(196,51,106,.1);color:var(--cat-awareness);border:1px solid rgba(196,51,106,.22);}
.cat-tag.sports{background:rgba(15,122,82,.1);color:var(--cat-sports);border:1px solid rgba(15,122,82,.22);}
.cat-tag.music{background:rgba(3,105,161,.1);color:var(--cat-music);border:1px solid rgba(3,105,161,.22);}
.cat-tag.industry{background:rgba(154,92,0,.1);color:var(--cat-industry);border:1px solid rgba(154,92,0,.22);}
.cat-tag.film{background:rgba(185,28,28,.1);color:var(--cat-film);border:1px solid rgba(185,28,28,.22);}
.cat-tag.retail{background:rgba(91,33,182,.1);color:var(--cat-retail);border:1px solid rgba(91,33,182,.22);}
.evt-span{font-size:10px;color:var(--muted);font-style:italic;}
.evt-source{font-size:9px;color:var(--subtle);background:var(--surface2);padding:1px 5px;border-radius:5px;border:1px solid var(--border);}

/* Why-tagged tooltip */
.evt-why{display:none;font-size:9px;color:var(--muted);margin-top:3px;font-style:italic;}
.event-card:hover .evt-why{display:block;}

.evt-shows{display:flex;gap:4px;flex-shrink:0;margin-left:auto;}
.show-pill{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;transition:transform .15s;cursor:default;position:relative;}
.show-pill:hover{transform:scale(1.15);}
.show-pill[data-show="DOAC"]{background:rgba(232,78,20,.12);color:var(--doac);border:1.5px solid rgba(232,78,20,.4);}
.show-pill[data-show="BA"]  {background:rgba(0,168,138,.12);color:var(--ba);border:1.5px solid rgba(0,168,138,.4);}
.show-pill[data-show="WNT"] {background:rgba(139,53,214,.12);color:var(--wnt);border:1.5px solid rgba(139,53,214,.4);}
.show-pill[data-show="TL"]  {background:rgba(2,132,199,.12);color:var(--tl);border:1.5px solid rgba(2,132,199,.4);}
.show-pill[data-show="HSR"] {background:rgba(212,0,90,.12);color:var(--hsr);border:1.5px solid rgba(212,0,90,.4);}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}
.empty-text{font-size:13px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>

// ── STATE ──
let activeMonth = 'jan';
let activeCat = 'all';
let activeShows = new Set(['DOAC','BA','WNT','TL','HSR']);

// ── MONTH NAV ──
const monthKeys = Object.keys(CALENDAR);
const monthNav = document.getElementById('monthNav');
monthKeys.forEach(key => {
  const data = CALENDAR[key];
  const btn = document.createElement('button');
  btn.className = 'month-btn' + (key === activeMonth ? ' active' : '');
  btn.dataset.month = key;
  btn.innerHTML = `${data.label}<span class="evt-count">${data.events.length}</span>`;
  btn.addEventListener('click', () => {
    activeMonth = key;
    activeCat = 'all';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  monthNav.appendChild(btn);
});

// ── SHOW LEGEND ──
const showLegend = document.getElementById('showLegend');
Object.entries(SHOWS).forEach(([key, s]) => {
  const item = document.createElement('div');
  item.className = 'show-legend-item';
  item.dataset.show = key;
  item.innerHTML = `
    <div class="show-pip" style="background:${s.color}18;color:${s.color};border:1.5px solid ${s.color}55">${s.abbr}</div>
    <div>
      <div class="show-legend-name">${s.name}</div>
      <div class="show-legend-host">${s.host}</div>
      <div class="show-legend-topics">${s.topics}</div>
    </div>`;
  item.addEventListener('click', () => {
    if (activeShows.has(key)) { if (activeShows.size > 1) activeShows.delete(key); }
    else activeShows.add(key);
    document.querySelectorAll('.show-legend-item').forEach(el =>
      el.classList.toggle('dimmed', !activeShows.has(el.dataset.show)));
    render();
  });
  showLegend.appendChild(item);
});

// ── CATEGORY FILTER ──
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeCat = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── RENDER ──
function render() {
  const data = CALENDAR[activeMonth];
  document.getElementById('monthDisplay').innerHTML = `${data.label} <em>2026</em>`;
  document.getElementById('themesRow').innerHTML = data.themes.map(t =>
    `<span class="theme-pill">${t}</span>`).join('');

  const filtered = data.events.filter(ev => {
    const catOk = activeCat === 'all' || ev.c === activeCat;
    const showOk = ev.s.some(s => activeShows.has(s));
    return catOk && showOk;
  });

  document.getElementById('evtCount').textContent = filtered.length;
  const list = document.getElementById('eventsList');
  list.innerHTML = '';

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">No events match your current filters.</div></div>`;
    return;
  }

  const catLabels = {
    theme:'Monthly Theme', awareness:'Awareness', sports:'Sports',
    music:'Music', industry:'Industry / Awards', film:'Film Release',
    retail:'Retail / Commercial'
  };

  filtered.forEach((ev, i) => {
    const card = document.createElement('div');
    card.className = 'event-card';
    card.style.animationDelay = `${i * 16}ms`;

    const parts = ev.e.split(' ');

    // Build why-tagged text filtered to active shows only
    let whyText = '';
    if (ev.w) {
      whyText = ev.w.split(' · ')
        .filter(line => {
          const showMap = {DOAC:'DC',BA:'BA',WNT:'WT',TL:'TL',HSR:'HS'};
          return Object.entries(showMap).some(([k]) =>
            activeShows.has(k) && line.toUpperCase().startsWith(k + ':')
          );
        }).join(' · ');
    }

    const showPills = ev.s
      .filter(s => activeShows.has(s))
      .map(s => `<div class="show-pill" data-show="${s}" title="${SHOWS[s].name}">${SHOWS[s].abbr}</div>`)
      .join('');

    card.innerHTML = `
      <div class="evt-date">
        <div class="d">${parts[0]}</div>
        ${parts[1] ? `<div class="m">${parts[1]}</div>` : ''}
      </div>
      <div class="evt-sep"></div>
      <div class="evt-content">
        <div class="evt-name">${ev.n}</div>
        <div class="evt-meta">
          <span class="cat-tag ${ev.c}">${catLabels[ev.c]||ev.c}</span>
          ${ev.sp ? `<span class="evt-span">· ${ev.sp}</span>` : ''}
          ${ev.src ? `<span class="evt-source">${ev.src}</span>` : ''}
        </div>
        ${whyText ? `<div class="evt-why">↳ ${whyText}</div>` : ''}
      </div>
      <div class="evt-shows">${showPills}</div>`;

    list.appendChild(card);
  });
}

render();
